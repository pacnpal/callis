<p id="upload-error-msg" hx-swap-oob="innerHTML"></p>
{% if keys %}
<figure>
  <table>
    <thead>
      <tr>
        <th>Label</th>
        <th>Type</th>
        <th>Fingerprint</th>
        <th>Added</th>
        <th>Last Used</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for key in keys %}
      <tr>
        <td>{{ key.label }}</td>
        <td><code>{{ key.key_type }}</code></td>
        <td><code class="text-small">{{ key.fingerprint }}</code></td>
        <td class="text-small">{{ key.created_at.strftime('%Y-%m-%d') }}</td>
        <td class="text-small">{{ key.last_used_at.strftime('%Y-%m-%d %H:%M') if key.last_used_at else "Never" }}</td>
        <td>
          <form method="post" action="/users/{{ target_user_id }}/keys/{{ key.id }}/revoke"
                hx-post="/users/{{ target_user_id }}/keys/{{ key.id }}/revoke" hx-target="#key-list" hx-swap="innerHTML"
                hx-confirm="Revoke this key? SSH access using this key will be denied immediately.">
            <button type="submit" class="outline secondary btn-sm">Revoke</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</figure>
{% else %}
<p class="text-muted">No active SSH keys. Upload one above to enable SSH access.</p>
{% endif %}
