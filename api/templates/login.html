{% extends "base.html" %}
{% block title %}Login - Callis{% endblock %}
{% block content %}
<article class="auth-card">
  <header>
    <h2>Sign In</h2>
  </header>
  <form method="post" action="/login">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required autocomplete="username" autofocus>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required autocomplete="current-password">

    <label for="totp_code">TOTP Code</label>
    <input type="text" id="totp_code" name="totp_code" autocomplete="one-time-code"
           placeholder="Leave blank on first login" inputmode="numeric" pattern="[0-9]{6}" maxlength="6">

    <button type="submit">Sign In</button>
  </form>
</article>
{% endblock %}
